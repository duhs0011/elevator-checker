<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛗 电梯物体进入性检查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .input-section, .result-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group h3 {
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        .input-field label {
            font-size: 0.9em;
            color: #555;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-field input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn-check {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-check:active {
            transform: translateY(0);
        }

        .result-box {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .result-box.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .result-box.fail {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .result-box h2 {
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .result-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-details h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
        }

        .detail-value {
            font-weight: bold;
            color: #333;
        }

        .visualization {
            margin-top: 20px;
        }

        .viz-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .viz-box {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .viz-box h4 {
            color: #555;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .viz-box canvas {
            background: white;
            border-radius: 8px;
            width: 100%;
        }

        .emoji {
            font-size: 1.5em;
            margin-right: 8px;
        }

        .input-icon {
            font-size: 1.2em;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛗 电梯物体进入性检查</h1>
        
        <div class="main-content">
            <!-- 输入区域 -->
            <div class="input-section">
                <div class="input-group">
                    <h3><span class="input-icon">🚪</span>电梯门尺寸</h3>
                    <div class="input-row">
                        <div class="input-field">
                            <label>门宽 (cm)</label>
                            <input type="number" id="doorWidth" placeholder="90" value="90" min="1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label>门高 (cm)</label>
                            <input type="number" id="doorHeight" placeholder="210" value="210" min="1" step="0.1">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <h3><span class="input-icon">📦</span>轿厢尺寸</h3>
                    <div class="input-row">
                        <div class="input-field">
                            <label>轿厢长 (cm)</label>
                            <input type="number" id="carLength" placeholder="150" value="150" min="1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label>轿厢宽 (cm)</label>
                            <input type="number" id="carWidth" placeholder="140" value="140" min="1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label>轿厢高 (cm)</label>
                            <input type="number" id="carHeight" placeholder="240" value="240" min="1" step="0.1">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <h3><span class="input-icon">📦</span>物体尺寸 (长方体)</h3>
                    <div class="input-row">
                        <div class="input-field">
                            <label>物体长 (cm)</label>
                            <input type="number" id="objLength" placeholder="120" value="120" min="1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label>物体宽 (cm)</label>
                            <input type="number" id="objWidth" placeholder="80" value="80" min="1" step="0.1">
                        </div>
                        <div class="input-field">
                            <label>物体高 (cm)</label>
                            <input type="number" id="objHeight" placeholder="200" value="200" min="1" step="0.1">
                        </div>
                    </div>
                </div>

                <button class="btn-check" onclick="checkElevator()">🔍 开始检查</button>
            </div>

            <!-- 结果区域 -->
            <div class="result-section">
                <div id="resultBox" class="result-box" style="display: none;">
                    <h2 id="resultTitle"></h2>
                    <p id="resultMessage"></p>
                </div>

                <div id="resultDetails" class="result-details" style="display: none;">
                    <h3>📋 详细信息</h3>
                    <div class="detail-item">
                        <span class="detail-label"><span class="emoji">🚪</span>通过电梯门:</span>
                        <span class="detail-value" id="doorPass"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label"><span class="emoji">💡</span>通过方式:</span>
                        <span class="detail-value" id="passMethod"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label"><span class="emoji">📦</span>放入轿厢:</span>
                        <span class="detail-value" id="carFit"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label"><span class="emoji">📐</span>放置方式:</span>
                        <span class="detail-value" id="fitMethod"></span>
                    </div>
                </div>

                <div id="visualization" class="visualization" style="display: none;">
                    <h3>🎨 可视化示意</h3>
                    <div class="viz-container">
                        <div class="viz-box">
                            <h4>🚪 通过电梯门 (侧视图)</h4>
                            <canvas id="doorCanvas" width="280" height="220"></canvas>
                        </div>
                        <div class="viz-box">
                            <h4>📦 轿厢俯视图</h4>
                            <canvas id="carTopCanvas" width="280" height="220"></canvas>
                        </div>
                    </div>
                    <div class="viz-container">
                        <div class="viz-box">
                            <h4>📦 轿厢侧视图</h4>
                            <canvas id="carSideCanvas" width="280" height="220"></canvas>
                        </div>
                        <div class="viz-box">
                            <h4>📦 轿厢 3D 示意</h4>
                            <canvas id="car3dCanvas" width="280" height="220"></canvas>
                        </div>
                    </div>
                </div>

                <div id="placeholder" style="text-align: center; padding: 60px 20px; color: #999;">
                    <p style="font-size: 3em; margin-bottom: 20px;">👆</p>
                    <p>在左侧输入尺寸，点击"开始检查"查看结果</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 获取所有旋转方向
        function getRotations(l, w, h) {
            const dims = [l, w, h];
            const rotations = new Set();
            
            // 生成所有排列组合 (6 种)
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    for (let k = 0; k < 3; k++) {
                        if (i !== j && i !== k && j !== k) {
                            rotations.add(`${dims[i]},${dims[j]},${dims[k]}`);
                        }
                    }
                }
            }
            
            return Array.from(rotations).map(s => s.split(',').map(Number));
        }

        // 检查能否通过门
        function canPassThroughDoor(objDims, door) {
            const [l, w, h] = objDims;
            const orientations = [
                { name: '长×宽', d1: l, d2: w },
                { name: '长×高', d1: l, d2: h },
                { name: '宽×高', d1: w, d2: h },
            ];

            for (const orient of orientations) {
                if (orient.d1 <= door.width && orient.d2 <= door.height) {
                    return { pass: true, method: `${orient.name} - 直接通过` };
                }
                if (orient.d2 <= door.width && orient.d1 <= door.height) {
                    return { pass: true, method: `${orient.name} - 旋转 90°通过` };
                }
            }

            // 检查对角线
            const doorDiagonal = Math.sqrt(door.width ** 2 + door.height ** 2);
            const sortedDims = [...objDims].sort((a, b) => a - b);
            const minFaceDiagonal = Math.sqrt(sortedDims[0] ** 2 + sortedDims[1] ** 2);

            if (minFaceDiagonal <= doorDiagonal && sortedDims[0] <= door.width) {
                return { pass: true, method: '最小面 - 斜向通过' };
            }

            return { pass: false, method: null };
        }

        // 检查能否放入轿厢
        function canFitInCar(objDims, car) {
            const carDims = [car.length, car.width, car.height];
            const rotations = getRotations(...objDims);

            for (const rot of rotations) {
                const objSorted = [...rot].sort((a, b) => a - b);
                const carSorted = [...carDims].sort((a, b) => a - b);

                if (objSorted.every((o, i) => o <= carSorted[i])) {
                    return {
                        fit: true,
                        method: `长=${rot[0].toFixed(0)}cm, 宽=${rot[1].toFixed(0)}cm, 高=${rot[2].toFixed(0)}cm`,
                        rotation: rot
                    };
                }
            }

            return { fit: false, method: null, rotation: null };
        }

        // 主检查函数
        function checkElevator() {
            const door = {
                width: parseFloat(document.getElementById('doorWidth').value),
                height: parseFloat(document.getElementById('doorHeight').value)
            };

            const car = {
                length: parseFloat(document.getElementById('carLength').value),
                width: parseFloat(document.getElementById('carWidth').value),
                height: parseFloat(document.getElementById('carHeight').value)
            };

            const objDims = [
                parseFloat(document.getElementById('objLength').value),
                parseFloat(document.getElementById('objWidth').value),
                parseFloat(document.getElementById('objHeight').value)
            ];

            const doorResult = canPassThroughDoor(objDims, door);
            const carResult = canFitInCar(objDims, car);

            const canEnter = doorResult.pass && carResult.fit;

            // 显示结果
            const resultBox = document.getElementById('resultBox');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');

            resultBox.style.display = 'block';
            resultBox.className = 'result-box ' + (canEnter ? 'success' : 'fail');

            if (canEnter) {
                resultTitle.innerHTML = '✅ 物体可以进入电梯';
                resultMessage.textContent = '恭喜！该物体可以通过电梯门并放入轿厢。';
            } else if (!doorResult.pass) {
                resultTitle.innerHTML = '❌ 物体无法通过电梯门';
                resultMessage.textContent = '物体尺寸过大，无法通过电梯门。';
            } else {
                resultTitle.innerHTML = '❌ 物体无法放入轿厢';
                resultMessage.textContent = '物体可通过门，但无法在轿厢内放置。';
            }

            // 显示详细信息
            document.getElementById('resultDetails').style.display = 'block';
            document.getElementById('doorPass').textContent = doorResult.pass ? '✅ 可以通过' : '❌ 无法通过';
            document.getElementById('passMethod').textContent = doorResult.method || '—';
            document.getElementById('carFit').textContent = carResult.fit ? '✅ 可以放入' : '❌ 无法放入';
            document.getElementById('fitMethod').textContent = carResult.method || '—';

            // 显示可视化
            document.getElementById('visualization').style.display = 'block';
            document.getElementById('placeholder').style.display = 'none';

            // 绘制图形
            drawDoorVisualization(door, objDims, doorResult.pass);
            drawCarTopView(car, objDims, carResult.rotation, carResult.fit);
            drawCarSideView(car, objDims, carResult.rotation, carResult.fit);
            drawCar3DView(car, objDims, carResult.rotation, carResult.fit);
        }

        // 绘制门通过示意图
        function drawDoorVisualization(door, objDims, canPass) {
            const canvas = document.getElementById('doorCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const scale = Math.min(canvas.width / door.width, canvas.height / door.height) * 0.7;
            const centerX = canvas.width / 2;
            const groundY = canvas.height - 20;

            // 绘制门框
            ctx.fillStyle = 'rgba(102, 126, 234, 0.3)';
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;

            const doorW = door.width * scale;
            const doorH = door.height * scale;

            ctx.fillRect(centerX - doorW / 2, groundY - doorH, doorW, doorH);
            ctx.strokeRect(centerX - doorW / 2, groundY - doorH, doorW, doorH);

            if (canPass) {
                // 绘制物体（选择一个能通过的方向）
                const rotations = getRotations(...objDims);
                let drawDims = null;

                for (const rot of rotations) {
                    if (rot[0] <= door.width && rot[1] <= door.height) {
                        drawDims = rot;
                        break;
                    }
                }

                if (drawDims) {
                    ctx.fillStyle = 'rgba(235, 51, 73, 0.6)';
                    ctx.strokeStyle = '#c0392b';

                    const objW = drawDims[0] * scale;
                    const objH = drawDims[1] * scale;

                    // 在门前绘制物体
                    ctx.fillRect(centerX - objW / 2, groundY - doorH - objH - 10, objW, objH);
                    ctx.strokeRect(centerX - objW / 2, groundY - doorH - objH - 10, objW, objH);

                    // 绘制箭头
                    ctx.beginPath();
                    ctx.moveTo(centerX, groundY - doorH - 5);
                    ctx.lineTo(centerX, groundY - doorH / 2);
                    ctx.strokeStyle = '#27ae60';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    // 箭头头部
                    ctx.beginPath();
                    ctx.moveTo(centerX - 8, groundY - doorH / 2 - 10);
                    ctx.lineTo(centerX, groundY - doorH / 2);
                    ctx.lineTo(centerX + 8, groundY - doorH / 2 - 10);
                    ctx.stroke();
                }
            }

            // 标注
            ctx.fillStyle = '#333';
            ctx.font = '12px sans-serif';
            ctx.fillText(`门宽：${door.width.toFixed(0)}cm`, centerX - 40, groundY - 5);
        }

        // 绘制轿厢俯视图
        function drawCarTopView(car, objDims, rotation, canFit) {
            const canvas = document.getElementById('carTopCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40;
            const availW = canvas.width - padding * 2;
            const availH = canvas.height - padding * 2;

            // 使用轿厢的长和宽作为俯视图
            const scale = Math.min(availW / car.length, availH / car.width) * 0.8;

            const carW = car.length * scale;
            const carH = car.width * scale;
            const startX = padding + (availW - carW) / 2;
            const startY = padding + (availH - carH) / 2;

            // 绘制轿厢底面
            ctx.fillStyle = 'rgba(102, 126, 234, 0.15)';
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.fillRect(startX, startY, carW, carH);
            ctx.strokeRect(startX, startY, carW, carH);

            if (canFit && rotation) {
                const [l, w, h] = rotation;
                const objL = l * scale;
                const objW = w * scale;

                // 物体居中放置
                const objX = startX + (carW - objL) / 2;
                const objY = startY + (carH - objW) / 2;

                ctx.fillStyle = 'rgba(235, 51, 73, 0.6)';
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 2;
                ctx.fillRect(objX, objY, objL, objW);
                ctx.strokeRect(objX, objY, objL, objW);

                // 标注物体尺寸
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${l.toFixed(0)}×${w.toFixed(0)}cm`, objX + objL/2, objY + objW/2 + 4);
            }

            // 标注
            ctx.fillStyle = '#333';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`轿厢俯视：${car.length.toFixed(0)}×${car.width.toFixed(0)}cm`, canvas.width/2, canvas.height - 8);
        }

        // 绘制轿厢侧视图
        function drawCarSideView(car, objDims, rotation, canFit) {
            const canvas = document.getElementById('carSideCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const padding = 40;
            const availW = canvas.width - padding * 2;
            const availH = canvas.height - padding * 2;

            // 使用轿厢的长和高作为侧视图
            const scale = Math.min(availW / car.length, availH / car.height) * 0.8;

            const carW = car.length * scale;
            const carH = car.height * scale;
            const startX = padding + (availW - carW) / 2;
            const groundY = padding + availH;

            // 绘制轿厢侧面
            ctx.fillStyle = 'rgba(102, 126, 234, 0.15)';
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.fillRect(startX, groundY - carH, carW, carH);
            ctx.strokeRect(startX, groundY - carH, carW, carH);

            if (canFit && rotation) {
                const [l, w, h] = rotation;
                const objL = l * scale;
                const objH = h * scale;

                // 物体放在地面居中
                const objX = startX + (carW - objL) / 2;
                const objY = groundY - objH;

                ctx.fillStyle = 'rgba(235, 51, 73, 0.6)';
                ctx.strokeStyle = '#c0392b';
                ctx.lineWidth = 2;
                ctx.fillRect(objX, objY, objL, objH);
                ctx.strokeRect(objX, objY, objL, objH);

                // 标注
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`高${h.toFixed(0)}cm`, objX + objL/2, objY + objH/2 + 4);
            }

            // 标注
            ctx.fillStyle = '#333';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`轿厢侧视：${car.length.toFixed(0)}×${car.height.toFixed(0)}cm`, canvas.width/2, canvas.height - 8);
        }

        // 绘制轿厢 3D 示意图
        function drawCar3DView(car, objDims, rotation, canFit) {
            const canvas = document.getElementById('car3dCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2 + 20;
            const scale = 0.6;

            // 等轴测投影参数
            const isoAngle = 30 * Math.PI / 180;
            const cosA = Math.cos(isoAngle);
            const sinA = Math.sin(isoAngle);

            // 轿厢尺寸（缩放后）
            const carL = car.length * scale;
            const carW = car.width * scale;
            const carH = car.height * scale * 0.5; // 高度压缩一些

            // 3D 到 2D 投影函数
            function project(x, y, z) {
                const isoX = (x - y) * cosA;
                const isoY = (x + y) * sinA - z;
                return { x: centerX + isoX, y: centerY + isoY };
            }

            // 轿厢顶点
            const carVerts = [
                project(-carL/2, -carW/2, 0),   // 0: 左下前
                project(carL/2, -carW/2, 0),    // 1: 右下前
                project(carL/2, carW/2, 0),     // 2: 右上前
                project(-carL/2, carW/2, 0),    // 3: 左上前
                project(-carL/2, -carW/2, carH), // 4: 左下后
                project(carL/2, -carW/2, carH),  // 5: 右下后
                project(carL/2, carW/2, carH),   // 6: 右上后
                project(-carL/2, carW/2, carH),  // 7: 左上前
            ];

            // 绘制轿厢底面
            ctx.fillStyle = 'rgba(102, 126, 234, 0.15)';
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(carVerts[0].x, carVerts[0].y);
            ctx.lineTo(carVerts[1].x, carVerts[1].y);
            ctx.lineTo(carVerts[2].x, carVerts[2].y);
            ctx.lineTo(carVerts[3].x, carVerts[3].y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 绘制轿厢立柱
            ctx.beginPath();
            ctx.moveTo(carVerts[0].x, carVerts[0].y);
            ctx.lineTo(carVerts[4].x, carVerts[4].y);
            ctx.moveTo(carVerts[1].x, carVerts[1].y);
            ctx.lineTo(carVerts[5].x, carVerts[5].y);
            ctx.moveTo(carVerts[2].x, carVerts[2].y);
            ctx.lineTo(carVerts[6].x, carVerts[6].y);
            ctx.moveTo(carVerts[3].x, carVerts[3].y);
            ctx.lineTo(carVerts[7].x, carVerts[7].y);
            ctx.stroke();

            // 绘制轿厢顶面
            ctx.beginPath();
            ctx.moveTo(carVerts[4].x, carVerts[4].y);
            ctx.lineTo(carVerts[5].x, carVerts[5].y);
            ctx.lineTo(carVerts[6].x, carVerts[6].y);
            ctx.lineTo(carVerts[7].x, carVerts[7].y);
            ctx.closePath();
            ctx.stroke();

            // 绘制物体
            if (canFit && rotation) {
                const [l, w, h] = rotation;
                const objL = l * scale;
                const objW = w * scale;
                const objH = h * scale * 0.5;

                const objVerts = [
                    project(-objL/2, -objW/2, 0),
                    project(objL/2, -objW/2, 0),
                    project(objL/2, objW/2, 0),
                    project(-objL/2, objW/2, 0),
                    project(-objL/2, -objW/2, objH),
                    project(objL/2, -objW/2, objH),
                    project(objL/2, objW/2, objH),
                    project(-objL/2, objW/2, objH),
                ];

                // 物体底面
                ctx.fillStyle = 'rgba(235, 51, 73, 0.7)';
                ctx.strokeStyle = '#c0392b';
                ctx.beginPath();
                ctx.moveTo(objVerts[0].x, objVerts[0].y);
                ctx.lineTo(objVerts[1].x, objVerts[1].y);
                ctx.lineTo(objVerts[2].x, objVerts[2].y);
                ctx.lineTo(objVerts[3].x, objVerts[3].y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 物体立柱
                ctx.beginPath();
                ctx.moveTo(objVerts[0].x, objVerts[0].y);
                ctx.lineTo(objVerts[4].x, objVerts[4].y);
                ctx.moveTo(objVerts[1].x, objVerts[1].y);
                ctx.lineTo(objVerts[5].x, objVerts[5].y);
                ctx.moveTo(objVerts[2].x, objVerts[2].y);
                ctx.lineTo(objVerts[6].x, objVerts[6].y);
                ctx.moveTo(objVerts[3].x, objVerts[3].y);
                ctx.lineTo(objVerts[7].x, objVerts[7].y);
                ctx.stroke();

                // 物体顶面
                ctx.beginPath();
                ctx.moveTo(objVerts[4].x, objVerts[4].y);
                ctx.lineTo(objVerts[5].x, objVerts[5].y);
                ctx.lineTo(objVerts[6].x, objVerts[6].y);
                ctx.lineTo(objVerts[7].x, objVerts[7].y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }

        // 支持回车键触发
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkElevator();
            }
        });
    </script>
</body>
</html>
